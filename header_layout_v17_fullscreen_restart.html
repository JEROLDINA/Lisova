<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header Layout</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500&display=swap" rel="stylesheet">

<style>
    html, body {
        margin: 0;
        padding: 0;
        background: #FFFFFF;
        overflow-x: hidden;
        overflow-y: auto;
        -ms-overflow-style: none;
        scrollbar-width: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: geometricPrecision;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
    }

    * {
        box-sizing: border-box;
    }

    body {
        font-family: 'Archivo', sans-serif;
        font-weight: 400;
    }

    .page {
        width: 2560px;
        height: 6255px;
        margin: 0 auto;
        background: #FFFFFF;
        position: relative;
    }

    .header {
        width: 2000px;
        height: 80px;
        background: #FFFFFF;
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        z-index: 1000;
    }

    .logo {
        width: 60px;
        height: 60px;
        margin-left: 10px;
        object-fit: contain;
        display: block;
        flex: 0 0 auto;
    }

    .nav {
        margin-left: auto;
        margin-right: 20px;
        display: flex;
        gap: 40px;
        align-items: center;
    }

    .nav-item {
        font-family: 'Archivo', sans-serif;
        font-size: 20px;
        line-height: 163.1%;
        letter-spacing: -0.02em;
        color: #000000;
        white-space: nowrap;
        font-weight: 400;
    }

    .version-row {
        width: 2000px;
        height: 80px;
        position: absolute;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 20px;
        background: #FFFFFF;
    }

    .version-text {
        font-family: 'Archivo', sans-serif;
        font-size: 15px;
        line-height: 163.1%;
        letter-spacing: -0.02em;
        white-space: nowrap;
        font-weight: 400;
    }

    .muted { color: #BFBFBF; }
    .dark { color: #000000; }

    .hero {
        width: 2000px;
        height: 1000px;
        position: absolute;
        top: 160px;
        left: 50%;
        transform: translateX(-50%);
        overflow: hidden;
    }

    .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.9);
        display: block;
    }

    .hero-title {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'Archivo', sans-serif;
        font-size: 60px;
        font-weight: 500;
        line-height: 163.1%;
        letter-spacing: -0.02em;
        color: #FFFFFF;
        white-space: nowrap;
        text-align: center;
    }

    .description-box {
        width: 646px;
        height: 280px;
        position: absolute;
        top: 1160px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: #FFFFFF;
    }

    .description-text {
        width: 560px;
        font-family: 'Archivo', sans-serif;
        font-size: 15px;
        line-height: 163.1%;
        letter-spacing: -0.02em;
        color: #000000;
        font-weight: 400;
        text-align: center;
        margin: 0;
    }

    .carousel-section {
        position: absolute;
        top: 1440px;
        left: 50%;
        transform: translateX(-50%);
        width: 2000px;
    }

    .carousel-viewport {
        width: 2000px;
        height: 1125px;
        overflow: hidden;
        position: relative;
        cursor: grab;
        user-select: none;
        touch-action: auto;
    }

    .carousel-viewport.dragging {
        cursor: grabbing;
    }

    .carousel-track {
        display: flex;
        gap: 20px;
        height: 1125px;
        will-change: transform;
        transform: translateX(0px);
    }

    .slide {
        width: 2000px;
        height: 1125px;
        flex: 0 0 2000px;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
    }

    .slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
    }

    .carousel-dots {
        width: 2000px;
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 20px;
    }

    .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #BFBFBF;
    }

    .dot.active {
        background: #000000;
    }


    .fullscreen-btn {
        position: absolute;
        right: 12px;
        bottom: 12px;
        width: 56px;
        height: 56px;
        border: none;
        background: transparent;
        padding: 0;
        cursor: pointer;
        z-index: 20;
    }

    .fullscreen-btn img,
    .fullscreen-close img {
        width: 56px;
        height: 56px;
        display: block;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
    }

    .fullscreen-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.96);
        display: none;
        z-index: 9999;
    }

    .fullscreen-modal.active {
        display: block;
    }

    .fullscreen-image-wrap {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
    }

    .fullscreen-image {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        display: block;
        user-select: none;
        -webkit-user-drag: none;
    }

    .fullscreen-close {
        position: absolute;
        right: 12px;
        bottom: 12px;
        width: 56px;
        height: 56px;
        border: none;
        background: transparent;
        padding: 0;
        cursor: pointer;
        z-index: 30;
    }

</style>
</head>

<body>
<div class="page">

    <div class="header">
        <img src="logo.png" class="logo" alt="Logo">
        <div class="nav">
            <div class="nav-item">КАТАЛОГ</div>
            <div class="nav-item">360 INTERACTIVE</div>
            <div class="nav-item">КОРЕКТИВИ</div>
        </div>
    </div>

    <div class="version-row">
        <div class="version-text">
            <span class="muted">Версія проєкту </span>
            <span class="dark">1.4 </span>
            <span class="muted">/ </span>
            <span class="dark">09.10.2025</span>
        </div>
    </div>

    <div class="hero">
        <img src="Titled.jpg" alt="Titled image">
        <div class="hero-title">COTTAGE LISOVA</div>
    </div>

    <div class="description-box">
        <p class="description-text">Сучасна резиденція, інтегрована в сосновий ліс, з підкреслено горизонтальною архітектурою. Візуалізація акцентує взаємодію будівлі з природою через скло, світло та натуральні матеріали.</p>
    </div>

    <section class="carousel-section">
        <div class="carousel-viewport" id="carouselViewport">
            <div class="carousel-track" id="carouselTrack">
                <div class="slide"><img src="A6.jpg" alt="A6 clone"></div>
                <div class="slide"><img src="A1.jpg" alt="A1"></div>
                <div class="slide"><img src="A2.jpg" alt="A2"></div>
                <div class="slide"><img src="A3.jpg" alt="A3"></div>
                <div class="slide"><img src="A4.jpg" alt="A4"></div>
                <div class="slide"><img src="A5.jpg" alt="A5"></div>
                <div class="slide"><img src="A6.jpg" alt="A6"></div>
                <div class="slide"><img src="A1.jpg" alt="A1 clone"></div>
            </div>
            <button class="fullscreen-btn" id="fullscreenOpen" aria-label="Open fullscreen">
                <img src="Icon_Plus.png" alt="Open fullscreen">
            </button>
        </div>
        <div class="carousel-dots" id="carouselDots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </section>


</div>


<script>
(function () {
    const viewport = document.getElementById('carouselViewport');
    const track = document.getElementById('carouselTrack');

    const realSlides = 6;
    const slideWidth = 2000;
    const gap = 20;
    const step = slideWidth + gap;

    let index = 1;
    let currentX = -index * step;
    let dragStartX = 0;
    let dragStartTranslate = currentX;
    let isPointerDown = false;
    let isDragging = false;
    let isAnimating = false;

    function setTransition(enabled) {
        track.style.transition = enabled
            ? 'transform 420ms cubic-bezier(0.22, 0.61, 0.36, 1)'
            : 'none';
    }

    function setTranslate(x) {
        currentX = x;
        track.style.transform = `translateX(${x}px)`;
    }

    function snapToIndex(targetIndex, animate = true) {
        index = targetIndex;
        isAnimating = animate;
        setTransition(animate);
        setTranslate(-index * step);
        updateDots();
    }

    const dots = document.querySelectorAll('.dot');

    function updateDots() {
        dots.forEach(d => d.classList.remove('active'));

        let realIndex = index;
        if (realIndex === 0) realIndex = realSlides;
        if (realIndex === realSlides + 1) realIndex = 1;

        dots[realIndex - 1].classList.add('active');
    }


    function goNext() {
        if (isAnimating) return;
        snapToIndex(index + 1, true);
    }

    function goPrev() {
        if (isAnimating) return;
        snapToIndex(index - 1, true);
    }

    track.addEventListener('transitionend', function () {
        isAnimating = false;

        if (index === 0) {
            snapToIndex(realSlides, false);
        } else if (index === realSlides + 1) {
            snapToIndex(1, false);
    updateDots();
        }
    });

    // Desktop drag with Pointer Events.
    viewport.addEventListener('pointerdown', function (e) {
        if (e.pointerType !== 'mouse') return;
        if (e.button !== 0) return;
        if (isAnimating) return;

        isPointerDown = true;
        isDragging = false;
        dragStartX = e.clientX;
        dragStartTranslate = currentX;

        viewport.classList.add('dragging');
        viewport.setPointerCapture(e.pointerId);
        setTransition(false);
    });

    viewport.addEventListener('pointermove', function (e) {
        if (!isPointerDown) return;

        const dx = e.clientX - dragStartX;

        // Do not block normal page scrolling unless the user is actually dragging.
        if (!isDragging && Math.abs(dx) < 6) return;

        isDragging = true;
        setTranslate(dragStartTranslate + dx);
    });

    function finishDrag(e) {
        if (!isPointerDown) return;

        const dx = e.clientX - dragStartX;

        isPointerDown = false;
        viewport.classList.remove('dragging');

        if (!isDragging) {
            setTransition(true);
            setTranslate(-index * step);
        updateDots();
            return;
        }

        const threshold = step * 0.16;

        if (dx <= -threshold) {
            snapToIndex(index + 1, true);
        } else if (dx >= threshold) {
            snapToIndex(index - 1, true);
        } else {
            snapToIndex(index, true);
        }

        isDragging = false;
    }

    viewport.addEventListener('pointerup', finishDrag);
    viewport.addEventListener('pointercancel', finishDrag);

    // Touch drag only.
    let touchStartX = 0;
    let touchStartTranslate = currentX;
    let touchDragging = false;

    viewport.addEventListener('touchstart', function (e) {
        if (isAnimating) return;
        touchDragging = true;
        touchStartX = e.touches[0].clientX;
        touchStartTranslate = currentX;
        setTransition(false);
    }, { passive: true });

    viewport.addEventListener('touchmove', function (e) {
        if (!touchDragging) return;
        const dx = e.touches[0].clientX - touchStartX;
        setTranslate(touchStartTranslate + dx);
    }, { passive: true });

    viewport.addEventListener('touchend', function (e) {
        if (!touchDragging) return;
        touchDragging = false;

        const dx = e.changedTouches[0].clientX - touchStartX;
        const threshold = step * 0.16;

        if (dx <= -threshold) {
            snapToIndex(index + 1, true);
        } else if (dx >= threshold) {
            snapToIndex(index - 1, true);
        } else {
            snapToIndex(index, true);
        }
    }, { passive: true });

    viewport.addEventListener('dragstart', function (e) {
        e.preventDefault();
    });

    // Keyboard navigation only.
    window.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            goPrev();
        } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            goNext();
        }
    });

    snapToIndex(1, false);
    updateDots();
})();
</script>


<div class="fullscreen-modal" id="fullscreenModal">
    <div class="fullscreen-image-wrap">
        <img class="fullscreen-image" id="fullscreenImage" src="A1.jpg" alt="Fullscreen image">
    </div>
    <button class="fullscreen-close" id="fullscreenClose" aria-label="Close fullscreen">
        <img src="Icon_Minus.png" alt="Close fullscreen">
    </button>
</div>

</body>
</html>
