<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header Layout</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500&display=swap" rel="stylesheet">

<style>
    html, body {
        margin: 0;
        padding: 0;
        background: #FFFFFF;
        overflow-x: hidden;
        overflow-y: auto;
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
    }

    * {
        box-sizing: border-box;
    }

    body {
        font-family: 'Archivo', sans-serif;
    }

    .page {
        width: 2560px;
        height: 6255px;
        margin: 0 auto;
        background: #FFFFFF;
        position: relative;
    }

    .header {
        width: 2000px;
        height: 80px;
        background: #FFFFFF;
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        z-index: 1000;
    }

    .logo {
        width: 60px;
        height: 60px;
        margin-left: 10px;
        object-fit: contain;
        display: block;
        flex: 0 0 auto;
    }

    .nav {
        margin-left: auto;
        margin-right: 20px;
        display: flex;
        gap: 40px;
        align-items: center;
    }

    .nav-item {
        font-size: 20px;
        line-height: 163.1%;
        letter-spacing: -0.02em;
        color: #000000;
        white-space: nowrap;
        font-weight: 400;
    }

    .version-row {
        width: 2000px;
        height: 80px;
        position: absolute;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 20px;
        background: #FFFFFF;
    }

    .version-text {
        font-size: 15px;
        line-height: 163.1%;
        letter-spacing: -0.02em;
        white-space: nowrap;
        font-weight: 400;
    }

    .muted { color: #BFBFBF; }
    .dark { color: #000000; }

    .hero {
        width: 2000px;
        height: 1000px;
        position: absolute;
        top: 160px;
        left: 50%;
        transform: translateX(-50%);
        overflow: hidden;
    }

    .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.9);
        display: block;
    }

    .hero-title {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 60px;
        font-weight: 500;
        line-height: 163.1%;
        letter-spacing: -0.02em;
        color: #FFFFFF;
        white-space: nowrap;
        text-align: center;
    }

    .description-box {
        width: 646px;
        height: 280px;
        position: absolute;
        top: 1160px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: #FFFFFF;
    }

    .description-text {
        max-width: 100%;
        font-size: 15px;
        line-height: 163.1%;
        letter-spacing: -0.02em;
        color: #000000;
        font-weight: 400;
        text-align: center;
        margin: 0;
    }
</style>
</head>

<body>
<div class="page">

    <div class="header">
        <img src="logo.png" class="logo" alt="Logo">
        <div class="nav">
            <div class="nav-item">КАТАЛОГ</div>
            <div class="nav-item">360 INTERACTIVE</div>
            <div class="nav-item">КОРЕКТИВИ</div>
        </div>
    </div>

    <div class="version-row">
        <div class="version-text">
            <span class="muted">Версія проєкту </span>
            <span class="dark">1.4 </span>
            <span class="muted">/ </span>
            <span class="dark">09.10.2025</span>
        </div>
    </div>

    <div class="hero">
        <img src="Titled.jpg" alt="Titled image">
        <div class="hero-title">COTTAGE LISOVA</div>
    </div>

    <div class="description-box">
        <p class="description-text">Сучасна резиденція, інтегрована в сосновий ліс, з підкреслено горизонтальною архітектурою. Візуалізація акцентує взаємодію будівлі з природою через скло, світло та натуральні матеріали.</p>
    </div>

</div>
</body>
</html>
