<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360 Viewer</title>

<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }

    body {
        cursor: grab;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: none;
        font-family: Arial, Helvetica, sans-serif;
    }

    body.dragging {
        cursor: grabbing;
    }

    canvas {
        display: block;
        width: 100%;
        height: 100%;
    }

    .viewer-hud {
        position: fixed;
        left: 12px;
        bottom: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.45);
        color: rgba(255, 255, 255, 0.92);
        font-size: 14px;
        line-height: 1.35;
        pointer-events: none;
        opacity: 1;
        transition: opacity 0.35s ease;
    }

    .viewer-hud.hidden {
        opacity: 0;
    }

    .viewer-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        font-size: 16px;
        letter-spacing: 0.02em;
        transition: opacity 0.25s ease;
        z-index: 10;
    }

    .viewer-loading.hidden {
        opacity: 0;
        pointer-events: none;
    }
</style>
</head>
<body>

<div class="viewer-loading" id="loading">Loading 360…</div>
<div class="viewer-hud" id="hud">Утримуйте ЛКМ та рухайте мишкою</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/build/three.min.js"></script>
<script>
(function () {
    function getParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
    }

    const pano = getParam("url") || "panorama.jpg";
    const loading = document.getElementById("loading");
    const hud = document.getElementById("hud");

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        1,
        1100
    );

    const renderer = new THREE.WebGLRenderer({
        antialias: true,
        powerPreference: "high-performance"
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(500, 80, 60);
    geometry.scale(-1, 1, 1);

    const textureLoader = new THREE.TextureLoader();
    textureLoader.load(
        pano,
        function (texture) {
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.generateMipmaps = false;

            const material = new THREE.MeshBasicMaterial({ map: texture });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            loading.classList.add("hidden");
            window.setTimeout(function () {
                hud.classList.add("hidden");
            }, 2200);
        },
        undefined,
        function () {
            loading.textContent = "Не вдалося завантажити панораму";
        }
    );

    camera.position.set(0, 0, 0.1);

    let isUserInteracting = false;
    let lon = 0;
    let lat = 0;
    let onPointerDownLon = 0;
    let onPointerDownLat = 0;
    let onPointerDownX = 0;
    let onPointerDownY = 0;

    function startInteraction(clientX, clientY) {
        isUserInteracting = true;
        document.body.classList.add("dragging");
        onPointerDownX = clientX;
        onPointerDownY = clientY;
        onPointerDownLon = lon;
        onPointerDownLat = lat;
        hud.classList.add("hidden");
    }

    function moveInteraction(clientX, clientY) {
        if (!isUserInteracting) return;
        lon = (onPointerDownX - clientX) * 0.12 + onPointerDownLon;
        lat = (clientY - onPointerDownY) * 0.12 + onPointerDownLat;
    }

    function endInteraction() {
        isUserInteracting = false;
        document.body.classList.remove("dragging");
    }

    document.addEventListener("mousedown", function (event) {
        event.preventDefault();
        startInteraction(event.clientX, event.clientY);
    });

    document.addEventListener("mousemove", function (event) {
        moveInteraction(event.clientX, event.clientY);
    });

    document.addEventListener("mouseup", endInteraction);
    document.addEventListener("mouseleave", endInteraction);

    document.addEventListener("touchstart", function (event) {
        if (!event.touches.length) return;
        const touch = event.touches[0];
        startInteraction(touch.clientX, touch.clientY);
    }, { passive: true });

    document.addEventListener("touchmove", function (event) {
        if (!event.touches.length) return;
        const touch = event.touches[0];
        moveInteraction(touch.clientX, touch.clientY);
    }, { passive: true });

    document.addEventListener("touchend", endInteraction, { passive: true });
    document.addEventListener("touchcancel", endInteraction, { passive: true });

    document.addEventListener("wheel", function (event) {
        camera.fov += event.deltaY * 0.04;
        camera.fov = Math.max(40, Math.min(90, camera.fov));
        camera.updateProjectionMatrix();
    }, { passive: true });

    window.addEventListener("keydown", function (event) {
        if (event.key === "ArrowLeft") lon -= 3;
        if (event.key === "ArrowRight") lon += 3;
        if (event.key === "ArrowUp") lat -= 2;
        if (event.key === "ArrowDown") lat += 2;
        if (event.key === "+" || event.key === "=") {
            camera.fov = Math.max(40, camera.fov - 2);
            camera.updateProjectionMatrix();
        }
        if (event.key === "-" || event.key === "_") {
            camera.fov = Math.min(90, camera.fov + 2);
            camera.updateProjectionMatrix();
        }
    });

    function animate() {
        requestAnimationFrame(animate);

        lat = Math.max(-85, Math.min(85, lat));

        const phi = THREE.MathUtils.degToRad(90 - lat);
        const theta = THREE.MathUtils.degToRad(lon);

        camera.lookAt(
            500 * Math.sin(phi) * Math.cos(theta),
            500 * Math.cos(phi),
            500 * Math.sin(phi) * Math.sin(theta)
        );

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", function () {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
})();
</script>

</body>
</html>
