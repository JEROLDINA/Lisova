<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header Layout</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400&display=swap" rel="stylesheet">

<style>
    html, body {
        margin: 0;
        padding: 0;
        background: #000000;
        overflow-x: hidden;
        overflow-y: auto;
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
    }

    * {
        box-sizing: border-box;
    }

    body {
        font-family: 'Archivo', sans-serif;
    }

    .page {
        width: 2560px;
        height: 6255px;
        margin: 0 auto;
        background: #000000;
        position: relative;
        overflow: hidden;
    }

    .header {
        width: 2000px;
        height: 80px;
        background: #FFFFFF;
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
    }

    .logo {
        width: 60px;
        height: 60px;
        margin-left: 10px;
        object-fit: contain;
        flex: 0 0 auto;
        display: block;
    }

    .nav {
        margin-left: auto;
        margin-right: 20px;
        display: flex;
        align-items: center;
        gap: 40px;
    }

    .nav-item {
        font-family: 'Archivo', sans-serif;
        font-weight: 400;
        font-size: 20px;
        line-height: 163.1%;
        letter-spacing: -0.02em;
        color: #000000;
        white-space: nowrap;
    }

    .version-row {
        width: 1980px;
        height: 80px;
        position: absolute;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 20px;
        background: transparent;
    }

    .version-text {
        font-family: 'Archivo', sans-serif;
        font-weight: 400;
        font-size: 15px;
        line-height: 163.1%;
        letter-spacing: -0.02em;
        white-space: nowrap;
    }

    .muted {
        color: #BFBFBF;
    }

    .dark {
        color: #000000;
    }

    .hero-image {
        width: 2000px;
        height: 1000px;
        position: absolute;
        top: 160px;
        left: 50%;
        transform: translateX(-50%);
        display: block;
        object-fit: cover;
    }
</style>
</head>

<body>
<div class="page">
    <div class="header">
        <img src="logo.png" class="logo" alt="Logo">

        <div class="nav">
            <div class="nav-item">КАТАЛОГ</div>
            <div class="nav-item">360 INTERACTIVE</div>
            <div class="nav-item">КОРЕКТИВИ</div>
        </div>
    </div>

    <div class="version-row">
        <div class="version-text">
            <span class="muted">Версія проєкту </span><span class="dark">1.4 </span><span class="muted">/ </span><span class="dark">09.10.2025</span>
        </div>
    </div>

    <img src="Titled.jpg" class="hero-image" alt="Titled image">
</div>
</body>
</html>
